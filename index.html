<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: black;\n            color: white;\n        }\n        canvas {\n            border: 1px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="pong" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const ctx = canvas.getContext('2d');\n        const paddleWidth = 10, paddleHeight = 80, ballSize = 10;\n        let player = { x: 0, y: canvas.height / 2 - paddleHeight / 2, score: 0 };\n        let computer = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, score: 0 };\n        let ball = { x: canvas.width / 2, y: canvas.height / 2, speedX: 5, speedY: 3 };\n        window.addEventListener('mousemove', function(event) {\n            let rect = canvas.getBoundingClientRect();\n            player.y = event.clientY - rect.top - paddleHeight / 2;\n        });\n        window.addEventListener('keydown', function(event) {\n            if (event.key === 'ArrowUp' && player.y > 0) {\n                player.y -= 20;\n            } else if (event.key === 'ArrowDown' && player.y < canvas.height - paddleHeight) {\n                player.y += 20;\n            }\n        });\n        function draw() {\n            // Clear canvas\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            // Draw paddles and ball\n            ctx.fillStyle = 'white';\n            ctx.fillRect(player.x, player.y, paddleWidth, paddleHeight);\n            ctx.fillRect(computer.x, computer.y, paddleWidth, paddleHeight);\n            ctx.beginPath();\n            ctx.arc(ball.x, ball.y, ballSize, 0, Math.PI * 2);\n            ctx.fill();\n            // Move the ball\n            ball.x += ball.speedX;\n            ball.y += ball.speedY;\n            // Collision detection\n            if (ball.y + ballSize > canvas.height || ball.y - ballSize < 0) {\n                ball.speedY = -ball.speedY;\n            }\n            // Paddle collision\n            if (ball.x <= player.x + paddleWidth && ball.y > player.y && ball.y < player.y + paddleHeight) {\n                ball.speedX = -ball.speedX;\n            } else if (ball.x >= computer.x - ballSize && ball.y > computer.y && ball.y < computer.y + paddleHeight) {\n                ball.speedX = -ball.speedX;\n            }\n            // Score update\n            if (ball.x < 0) {\n                computer.score++;\n                resetBall();\n            } else if (ball.x > canvas.width) {\n                player.score++;\n                resetBall();\n            }\n            // Computer AI\n            computer.y += (ball.y - (computer.y + paddleHeight / 2)) * 0.1;\n        }\n        function resetBall() {\n            ball.x = canvas.width / 2;\n            ball.y = canvas.height / 2;\n            ball.speedX = -ball.speedX;\n        }\n        function gameLoop() {\n            draw();\n            requestAnimationFrame(gameLoop);\n        }\n        gameLoop();\n    </script>\n</body>\n</html>
